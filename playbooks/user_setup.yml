- name: Setup users
  hosts: all
  become: true

  vars_files:
    - ../vars/example_users.yml

  tasks:
    - name: Create users
      ansible.builtin.user:
        name: "{{ item.username }}"
        shell: /bin/bash
        state: "{{ item.state | default('present') }}"
      loop: "{{ users }}"

    - name: Add user groups
      ansible.builtin.user:
        name: "{{ item.username }}"
        group: "{{ item.group }}"
      loop: "{{ users }}"
      when: item.group is defined
    - name: Print SSH key
      ansible.builtin.debug:
        msg: "{{ item.ssh_key }}"
      loop: "{{ users }}"

    - name: Add SSH keys
      ansible.posix.authorized_key:
        user: "{{ item.username }}"
        key: "{{ item.ssh_key }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ users }}"
